name = "pixel-agent-relay"
main = "src/index.ts"
compatibility_date = "2026-05-01"
# Sprint 49.1: workers_dev explicit true denendi ama Cloudflare cert
# provisioning sorununu çözmüyor — config kalsın, ileride faydalı olabilir.
workers_dev = true

[durable_objects]
bindings = [
  { name = "RELAY_SESSIONS", class_name = "RelaySession" }
]

[[migrations]]
tag = "v1"
# SQLite-backed Durable Objects (free plan compatible).
# new_classes (key-value DO) requires Workers Paid; new_sqlite_classes is free.
new_sqlite_classes = ["RelaySession"]
