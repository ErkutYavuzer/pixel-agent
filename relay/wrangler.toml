name = "pixel-agent-relay"
main = "src/index.ts"
compatibility_date = "2026-05-01"

[durable_objects]
bindings = [
  { name = "RELAY_SESSIONS", class_name = "RelaySession" }
]

[[migrations]]
tag = "v1"
# SQLite-backed Durable Objects (free plan compatible).
# new_classes (key-value DO) requires Workers Paid; new_sqlite_classes is free.
new_sqlite_classes = ["RelaySession"]
