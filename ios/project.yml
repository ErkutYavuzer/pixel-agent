name: PixelAgentRemote
options:
  bundleIdPrefix: dev.erkutyavuzer
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: tr
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  PixelAgent:
    path: ../

targets:
  PixelAgentRemote:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PixelAgentRemote
        excludes:
          - "Info.plist"
    info:
      path: PixelAgentRemote/Info.plist
      properties:
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        CFBundleDevelopmentRegion: tr
        CFBundleDisplayName: Pixel
        UILaunchScreen: {}
        NSCameraUsageDescription: "Mac'inizdeki pixel-agent ile eşleşmek için QR kodu kameraya gösterin."
        NSLocalNetworkUsageDescription: "Aynı ağdaki Mac'inizle doğrudan iletişim kurmak için (gelecekte LAN modu)."
    dependencies:
      - package: PixelAgent
        product: PixelCore
      - package: PixelAgent
        product: PixelRemote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.erkutyavuzer.PixelAgentRemote
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: LH3Z8J92FX
