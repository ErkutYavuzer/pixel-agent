included:
  - Sources
  - Tests

excluded:
  - .build
  - .swiftpm
  - relay/node_modules

disabled_rules:
  - trailing_comma

opt_in_rules:
  - explicit_init
  - first_where
  - last_where
  - prefer_zero_over_explicit_init
  - sorted_imports
  - unused_import
  - empty_count
  - explicit_self
  - force_unwrapping
  - implicit_return

line_length:
  warning: 120
  error: 200
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 80
  error: 200

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

cyclomatic_complexity:
  warning: 12
  error: 25

identifier_name:
  min_length: 1
  max_length: 60

nesting:
  type_level: 4

reporter: "xcode"
