name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build DocC
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Generate DocC documentation
        run: |
          swift package --allow-writing-to-directory ./docs/_site \
            generate-documentation \
            --target PixelCore \
            --target PixelBackends \
            --target PixelTools \
            --target PixelMemory \
            --target PixelMascot \
            --target PixelRemote \
            --enable-experimental-combined-documentation \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path pixel-agent \
            --output-path ./docs/_site

      - name: Add redirect index
        run: |
          cat > ./docs/_site/index.html <<'EOF'
          <!DOCTYPE html>
          <html><head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=./documentation/pixelcore/">
            <title>pixel-agent docs</title>
          </head><body>
            <p>Redirecting to <a href="./documentation/pixelcore/">documentation</a>...</p>
          </body></html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/_site

  deploy:
    name: Deploy to Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
