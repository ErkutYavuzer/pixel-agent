name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build DocC
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Generate DocC documentation
        run: |
          swift package --allow-writing-to-directory ./docs/_site \
            generate-documentation \
            --target PixelCore \
            --target PixelBackends \
            --target PixelTools \
            --target PixelMemory \
            --target PixelMascot \
            --target PixelRemote \
            --enable-experimental-combined-documentation \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path pixel-agent \
            --output-path ./docs/_site

      - name: Compose Pages output (landing page + assets + DocC)
        run: |
          # DocC çıktısı docs/_site'a build edildi (documentation/ altında).
          # Landing page'i _site root'una koy; DocC API docs /documentation/pixelcore/
          # subpath'ında erişilebilir kalır.
          cp docs/landing-page/index.html docs/_site/index.html
          cp docs/landing-page/style.css docs/_site/style.css

          # Hero/screenshot için assets/, OG image için root'a kopya.
          mkdir -p docs/_site/assets
          cp docs/assets/*.png docs/_site/assets/
          cp docs/assets/og-image.png docs/_site/og-image.png

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/_site

  deploy:
    name: Deploy to Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
